<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fórmularios de cadastro</title>
</head>
<body>
    <header>Formulario de cadastro</header>
    <main>
        <section>
            <form action="sucesso.html" method="post">
                <fieldset>
                    <legend>Dados pessoais</legend>
                     <label for="nome">Nome</label><br>
                     <input type="text" name="nome" id="nome" 
                     placeholder="Insira o seu nome completo"required>
                     <br>
                     <label for="email">Email</label><br>
                    <input type="email" name="email" id="email" 
                    placeholder="Insira seu email" required>
                    <br>
                    <label for="password">Senha:</label><br>
                    <input type="password" name="password"
                    id="password" 
                    placeholder="Insira sua senha" required>
                    <br>
                    <label for="nascimento">Data de nascimento</label><br>
                    <input type="date" name="nascimento"
                    id="nascimento"><br>
                    <label for="sexo">Sexo:</label><br>
                    <input type="radio" name="sexo" id="masc" value="m" >Masculino
                    <input type="radio" name="sexo" id="fem" value="f">Feminino
                    </fieldset>
                    <fieldset>
                        <legend>Dados do produto</legend>
                        <label for="quantidade">Quantidade</label><br>
                        <input type="number" name="quantidade" 
                        id="quantidade" min="1" max="10"><br>
                        <label for="cor">Cor:</label><br>
                        <input type="color"><br>
                        <label for="entrega">Agendar entrega para data</label><br>
                        <input type="datetime-local"><br>
                        <label for="frete">Selecione o frete:</label><br>
                        <select name="frete" id="frete">
                            <option value="pac">PAC</option>
                            <option value="sedex">Sedex</option>
                            <option value="sedex10">Sedex 10</option>
                        </select><br><br>
                        <label for="observacoes">Observações:</label><br>
                        <textarea rows="4" cols="40" name="observacoes" id="observacoes" 
                        placeholder="Escreva aqui Observações sobr eo produto">
                        </textarea><br><br>
                        <input type="checkbox" name="termos" id="termos">
                        Li e aceitos os termos de uso
                        <br><br>
                        
                        <a href="termos.html">
                    
                        <button type="button">Ler os termos de Uso</button>

                        </a>

                        <br><br><hr><br>
                        <button type="submit">Enviar</button>
                        <button type="reset">Limpar</button>
                    </fieldset>

            </form>
        </section>
    </main>
</body>
</html>
