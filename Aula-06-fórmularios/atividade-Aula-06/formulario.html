<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmulario</title>
</head>
<body>
     <h1>Cadastro de Aluno - DSM</h1>
    <p>Formulário sobre o cadastro do aluno do DSM</p>
    <form action="#" method="POST">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome</label><br>
            <input type="text" name="nome" id="nome" 
                     placeholder="Insira o seu nome completo"required><br>
            <label for="email">Email</label><br>
            <input type="email" name="email" id="email" 
                    placeholder="Insira seu email" required>
            <br>
        </fieldset>
        
        <fieldset>
        <legend>Dados Acadêmicos</legend>
        <label for="curso">Curso</label><br>
        <select name="curso" id="Curso">

        <option value="dsm">DSM</option>

        <option value="ads">ADS</option>

        <option value="outro">Outro</option>

        <label for="periodo">Período</label>
        <select name="periodo" id="Período"></select><br>

         <label for="periodo">Período</label><br>

        <select name="periodo" id="Período">
        <br><option value="manhã">Manhã</option><br>

        <br><option value="noite">Noite</option><br>
        </select>

        <br><br><label for="comentarios">Comentários:</label><br>
        <textarea rows="4" cols="40" name="comentarios" id="comentarios" 
        placeholder="Escreva aqui Observações sobr eo produto">
        </textarea><br>
            <br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
    </form>
</body>
</html>
