<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras mídias no HTML5</title>
</head>

<body>
    <header>
        <h1>Outras mídas no HTML5</h1>
    </header>
    <main>
        <section>
            <h2>Aúdio</h2>
            <audio controls src="midias/audio.mp3"></audio>

            <h2>Vídeo</h2>
            <video controls src="midias/video.mp4" type="video/mp4" width="400px">
                Vídeo não encontrado ou não suportado.
            </video>

            <h2>Vídeo do Youtube (externo) - iFrame</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/-YbiBclEEgo?si=bo2rtYpfmALDY4Ft"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <!-- Incorporando Mapas  -->
            <h2>Mapas (iframe)</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3630.6909639367154!2d-47.84882298909108!3d-24.496162296508523!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c5338bea658bc1%3A0xdea6f93b5aae61a8!2sFatec%20Registro!5e0!3m2!1spt-BR!2sbr!4v1773192734945!5m2!1spt-BR!2sbr"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>

            <!-- Incorporando PDFs -->
            <h2>PDF (iframe)</h2>
            <iframe src="midias/documento.pdf" frameborder="0" title="Horários DSM-1" width="600px" height="450px">
            </iframe>
