<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras mídias no HTML5</title>
</head>
<body>
    <header>
        <h1>Outras mídias do HMTL5</h1>
    </header>
<main>
    <section>
        <h2>Aúdio</h2>
        <audio controls src="midias/audio.mp3"></audio>

        <h2>Vídeo</h2>
        <video controls src="midias/video.mp4" type="video/mp4" width="400px"
        Vídeo não encontrado ou não suportado.
        </video>

        <h2>Vídeo do Youtube(externo) - iFrame </h2>
           



        <h2>Mapas (iFrame)</h2>

        <!--Incorporando Mapas-->
       <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29043.345177840874!2d-48.869098720540364!3d-24.50560940237839!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c3666648170c65%3A0x18bff4fbc774da03!2sApia%C3%AD%2C%20State%20of%20S%C3%A3o%20Paulo%2C%2018320-000!5e0!3m2!1sen!2sbr!4v1773192744310!5m2!1sen!2sbr"
        width="600"
         height="450" 
         style="border:0;" 
         allowfullscreen="" 
         loading="lazy" 
         referrerpolicy="no-referrer-when-downgrade">
        </iframe>


        <!--Incorporando PDF-->
        <h2>PDF (iframe)</h2>
        <iframe src="midias/documento.pdf"
         frameborder="0"
        title=Horários DSM-1
        width="600px"
        height="450px"
        </iframe>


        <!--Vetores (Ilustraçôes)-->
        <h2>Vetores (Ilustraçôes)</h2>

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3v9.28a4.4 4.4 0 0 0-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3z"/></svg>



    </section>
</main>
    
</body>
</html>
